<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Jogo da Velha</title>
<style>
body{
    font-family: Arial;
    text-align:center;
}

#tabuleiro{
    width:300px;
    margin:20px auto;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:5px;
}

.celula{
    width:100px;
    height:100px;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid black;
    cursor:pointer;
}

button{
    margin-top:15px;
    padding:10px;
}
</style>
</head>

<body>

<h1>Jogo da Velha</h1>
<div id="tabuleiro"></div>

<p id="status"></p>
<button onclick="reiniciar()">Reiniciar</button>

<script src="script.js"></script>

</body>
</html>
